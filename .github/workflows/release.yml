name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Validate VERSION
        shell: bash
        run: |
          VERSION="$(tr -d '\r\n' < VERSION)"
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "VERSION debe tener formato vX.Y.Z"
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Lint PHP files
        shell: bash
        run: |
          find . -type f -name "*.php" -print0 | xargs -0 -n1 php -l

  release:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        shell: bash
        run: echo "VERSION=$(tr -d '\r\n' < VERSION)" >> "$GITHUB_ENV"

      - name: Ensure the tag does not already exist
        shell: bash
        run: |
          if git ls-remote --exit-code --tags origin "${VERSION}" >/dev/null 2>&1; then
            echo "La versión ${VERSION} ya existe. Incrementa VERSION antes de hacer push."
            exit 1
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          generate_release_notes: true
